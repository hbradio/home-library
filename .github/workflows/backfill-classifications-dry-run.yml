name: Backfill Classifications (Dry Run)

on:
  workflow_dispatch:

jobs:
  backfill-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build backfill tool
        run: go build -o backfill ./cmd/backfill-classifications

      - name: Run backfill (dry run)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: ./backfill --dry-run
